server:
  port: 8080

spring:
  cloud:
    gateway:
      default-filters:
        - AddResponseHeader=X-Gateway, microservices-platform
      routes:
        - id: users-service-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
        - id: projects-service-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/projects/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always