server:
  port: 8080

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000
  cloud:
    gateway:
      default-filters:
        - AddResponseHeader=X-Gateway, microservices-platform
      routes:
        - id: users-service-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
        - id: projects-service-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/projects/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  info:
    env:
      enabled: true

info:
  app:
    name: gateway-service
    description: API Gateway de la plataforma de microservicios
    version: 1.0.0